<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Document</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Description" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />

  <!-- Theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/buble.css" />
</head>

<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
	name: 'Project-planner',
	repo: '',
	auto2top: false,
	loadSidebar: true,
	plugins: [
	    function (hook) {
		hook.afterEach(function (html, next) {
		    const url = 'https://github.com/USER/REPO/edit/main/docs/' + vm.route.file;
		    next(html + `<hr><a href="${url}">Edit this page</a>`);
		});
	    }
	],	

      // Search plugin
      search: {
        placeholder: 'Search',
        noData: 'No results',
        depth: 6
      },

      // Mermaid plugin
      mermaidConfig: {
        querySelector: ".mermaid"
      }
    };
  </script>

  <!-- Docsify -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>

  <!-- Search plugin -->
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>

  <!-- Mermaid + Docsify Mermaid plugin -->
  <script src="//cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-mermaid@latest/dist/docsify-mermaid.js"></script>
  <script>
    mermaid.initialize({ startOnLoad: true });
  </script>
</body>
</html>
